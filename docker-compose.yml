services:
  hermes-workspace:
    image: ghcr.io/outsourc-e/hermes-workspace:latest
    restart: unless-stopped
    user: "0:0"
    depends_on:
      hermes-agent:
        condition: service_healthy
    env_file:
      - .env
    environment:
      HOME: /home/workspace
      HERMES_WORKSPACE_DIR: /home/workspace/workspace
      HERMES_API_URL: "http://hermes-agent:8642"
      HERMES_DASHBOARD_URL: "http://hermes-agent:9119"
      HERMES_API_TOKEN: "${API_SERVER_KEY:-}"
      HERMES_PASSWORD: "${HERMES_PASSWORD:-}"
      COOKIE_SECURE: "1"
      TRUST_PROXY: "1"
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${COMPOSE_PROJECT_NAME}.${TRAEFIK_HOST}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=3000
    volumes:
      - hermes-workspace-data:/home/workspace/.hermes
      - hermes-shared-workspace:/home/workspace/workspace

  hermes-agent:
    build:
      context: .
      dockerfile: docker/hermes.Dockerfile
    restart: unless-stopped
    working_dir: /home/workspace/workspace
    command: ["gateway", "run"]
    env_file:
      - .env
    ports:
      - "${HERMES_DESKTOP_PUBLIC_PORT:-8642}:8642"
    expose:
      - "8642"
      - "9119"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      API_SERVER_KEY: ${API_SERVER_KEY:-}
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_ENABLED: "true"
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"
    volumes:
      - hermes-data:/opt/data
      - hermes-shared-workspace:/home/workspace/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8642/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  searxng:
    image: ghcr.io/searxng/searxng:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SEARXNG_SECRET: "${SEARXNG_SECRET}"
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-cache:/var/cache/searxng
    expose:
      - "8080"
    labels:
      - traefik.enable=true
      - traefik.http.routers.searxng-${COMPOSE_PROJECT_NAME}.rule=Host(`searxng.${TRAEFIK_HOST}`)
      - traefik.http.routers.searxng-${COMPOSE_PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.searxng-${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.searxng-${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=8080

volumes:
  hermes-data:
  hermes-workspace-data:
  hermes-shared-workspace:
  searxng-cache:

use_default_settings: true

server:
  limiter: false
  image_proxy: true

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "pt-BR"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: g
    use_mobile_ui: false
    weight: 2
  - name: bing
    engine: bing
    shortcut: b
    weight: 1
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    weight: 1
  - name: brave
    engine: brave
    shortcut: br
    weight: 1
  - name: wikipedia
    engine: wikipedia
    shortcut: w
    base_url: "https://pt.wikipedia.org/"
  - name: wikidata
    engine: wikidata
    shortcut: wd
  - name: github
    engine: github
    shortcut: gh
    disabled: false
  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false
  - name: npm
    engine: npm
    shortcut: npm
    disabled: false
  - name: pypi
    engine: pypi
    shortcut: pypi
    disabled: false
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false
  - name: youtube
    engine: youtube_noapi
    shortcut: yt
  - name: reddit
    engine: reddit
    shortcut: r
    disabled: false
